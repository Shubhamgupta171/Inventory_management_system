[build]
  command = "npm run build"
  publish = "dist"

# SPA fallback so client-side routes work on direct navigation / refresh.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Set VITE_API_URL in the Netlify UI (Site settings → Environment variables)
# to your deployed backend URL, then trigger a redeploy.
