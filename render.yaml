# =========================================================================== #
# Render Blueprint — one-click backend + PostgreSQL deployment.
#
# In the Render dashboard:  New +  ->  Blueprint  ->  connect this repo.
# Render reads this file, provisions a free Postgres instance and a Docker
# web service for the backend, and wires DATABASE_URL automatically.
#
# After the first deploy, set CORS_ORIGINS to your deployed frontend URL.
# =========================================================================== #
databases:
  - name: ioms-db
    databaseName: inventory
    user: ioms_user
    plan: free

services:
  - type: web
    name: ioms-backend
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ioms-db
          property: connectionString
      # Set this to your frontend URL after deploying the frontend,
      # e.g. https://your-app.vercel.app  (sync:false = set in dashboard)
      - key: CORS_ORIGINS
        sync: false
      - key: SEED_DATA
        value: "true"
      - key: LOW_STOCK_THRESHOLD
        value: "10"
      - key: ENVIRONMENT
        value: production
